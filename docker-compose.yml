services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: danbyte
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: .
    # Migrate + idempotent first-run bootstrap (default Organization, built-in
    # statuses, optional superuser) before serving, so a fresh box comes up
    # usable with no manual steps. All three are safe to re-run on every boot.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py bootstrap &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: danbyte
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEBUG: "True"
      # Set these to have `bootstrap` create the first admin automatically.
      # DJANGO_SUPERUSER_USERNAME: admin
      # DJANGO_SUPERUSER_PASSWORD: change-me
      # DJANGO_SUPERUSER_EMAIL: admin@example.com
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  workers:
    build: .
    command: python manage.py rqworker default high low
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: danbyte
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data:
