name: Release

# On a version tag: run the full test suite, build the fully-offline bundle,
# prove the bundle actually boots (install-smoke against Postgres), and only
# then publish the GitHub Release. The in-app updater discovers versions via
# the Releases API, so nothing reaches the fleet until every gate is green.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Gate 1: the backend suite + frontend build must pass for this tag ──────
  test:
    name: Tests (backend suite + frontend build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: danbyte
          POSTGRES_USER: danbyte
          POSTGRES_PASSWORD: danbyte
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U danbyte"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_NAME: danbyte
      DB_USER: danbyte
      DB_PASSWORD: danbyte
      REDIS_URL: redis://127.0.0.1:6379/0
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      DJANGO_SECRET_KEY: ci-not-a-real-secret
      DEBUG: 'True'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: System deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/*google* /etc/apt/sources.list.d/*chrome* || true
          sudo apt-get update || sudo apt-get update
          sudo apt-get install -y build-essential libldap2-dev libsasl2-dev
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff
      - name: Migrations + undefined-name gate
        run: |
          python manage.py migrate --noinput
          python manage.py makemigrations --check --dry-run
          ruff check --select F821 .
      - name: OpenAPI schema generates cleanly
        # The committed openapi.yaml (repo root) is the source of truth the API
        # reference site tracks; prove the schema still builds with no errors.
        run: python manage.py spectacular --file /tmp/openapi.yaml --validate
      - name: Backend test suite
        run: python manage.py test --noinput
      - name: Frontend build + typecheck + unit tests
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm run typecheck
          npm run test

  # ── Build the offline bundle (only after tests pass) ───────────────────────
  bundle:
    name: Build offline bundle
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build toolchain deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/*google* /etc/apt/sources.list.d/*chrome* || true
          sudo apt-get update || sudo apt-get update
          # build-essential: python-ldap compiles its wheel into the wheelhouse.
          sudo apt-get install -y build-essential libldap2-dev libsasl2-dev xz-utils
      - name: Build release bundle
        run: |
          chmod +x scripts/build-release.sh
          scripts/build-release.sh "${GITHUB_REF_NAME#v}"
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: dist/*
          retention-days: 1

  # ── Gate 2: the built bundle must actually install + boot ──────────────────
  smoke:
    name: Install smoke (bundle boots against Postgres)
    needs: bundle
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: danbyte
          POSTGRES_USER: danbyte
          POSTGRES_PASSWORD: danbyte
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U danbyte"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_NAME: danbyte
      DB_USER: danbyte
      DB_PASSWORD: danbyte
      DJANGO_SECRET_KEY: ci-not-a-real-secret
      MONITORING_SECRET_KEY: ci-not-a-real-monitoring-key
      DEBUG: 'False'
      ALLOWED_HOSTS: '127.0.0.1,localhost'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: dist
      - name: Verify checksum
        run: |
          cd dist
          sha256sum -c ./*.tar.gz.sha256
      - name: Extract + boot the bundled interpreter
        run: |
          set -euo pipefail
          tar -xzf dist/*.tar.gz -C /tmp
          BUNDLE=$(find /tmp -maxdepth 1 -type d -name 'danbyte-*' | head -1)
          PY="$BUNDLE/vendor/python/bin/python3"
          "$PY" -m venv /tmp/venv
          /tmp/venv/bin/pip install --no-index --find-links "$BUNDLE/vendor/wheels" \
            -r "$BUNDLE/requirements.txt"
          cd "$BUNDLE"
          # The offline bundle must migrate + pass system checks on a clean DB.
          /tmp/venv/bin/python manage.py migrate --noinput
          /tmp/venv/bin/python manage.py check
      - name: Boot gunicorn + hit /api/health/
        run: |
          set -euo pipefail
          BUNDLE=$(find /tmp -maxdepth 1 -type d -name 'danbyte-*' | head -1)
          cd "$BUNDLE"
          # Boot the real WSGI server the way production does and prove the app
          # actually serves requests — not just that migrate/check pass.
          /tmp/venv/bin/gunicorn danbyte.wsgi:application \
            --bind 127.0.0.1:8000 --workers 2 --timeout 30 \
            --access-logfile - --error-logfile - &
          GUNICORN_PID=$!
          trap 'kill "$GUNICORN_PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.json -w '%{http_code}' \
              http://127.0.0.1:8000/api/health/ || true)
            [ "$code" = "200" ] && break
            sleep 1
          done
          echo "health response: $(cat /tmp/health.json 2>/dev/null)"
          [ "$code" = "200" ] || { echo "health check failed (HTTP $code)"; exit 1; }
          grep -q '"status": *"ok"' /tmp/health.json

  # ── Publish only after tests + smoke are green ─────────────────────────────
  publish:
    name: Publish release + attach bundle
    needs: [bundle, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundle
          path: dist
      - name: Publish release + attach bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
