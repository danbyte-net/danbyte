    PatchedASNRequest:
      type: object
      description: |-
        Field-level validation of ``custom_fields`` against the active tenant's
        custom-field definitions. Subclasses set ``cf_model`` to the model slug
        (e.g. ``"prefix"``) and include ``custom_fields`` in ``Meta.fields``.

        The validator only runs when ``custom_fields`` is in the payload, so a
        PATCH that doesn't touch it leaves stored values alone.
      properties:
        asn:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: 1…4294967295 (32-bit).
        rir_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        site_ids:
          type: array
          items:
            type: string
            format: uuid
            writeOnly: true
          writeOnly: true
        description:
          type: string
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        custom_fields:
          description: User-defined custom fields
    PatchedAggregateRequest:
      type: object
      description: |-
        Field-level validation of ``custom_fields`` against the active tenant's
        custom-field definitions. Subclasses set ``cf_model`` to the model slug
        (e.g. ``"prefix"``) and include ``custom_fields`` in ``Meta.fields``.

        The validator only runs when ``custom_fields`` is in the payload, so a
        PATCH that doesn't touch it leaves stored values alone.
      properties:
        prefix:
          type: string
          minLength: 1
          description: e.g. 10.0.0.0/8 or 2001:db8::/32
          maxLength: 43
        rir_id:
          type: string
          format: uuid
          writeOnly: true
        date_added:
          type: string
          format: date
          nullable: true
        description:
          type: string
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        custom_fields:
          description: User-defined custom fields
    PatchedAlertRuleRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        enabled:
          type: boolean
        weight:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Lower weights match first.
        match_kinds:
          description: Check kinds this rule covers.
        match_statuses:
          description: Bad statuses that trigger this rule (down/stale/degraded).
        match_tag_slugs:
          description: Only IPs carrying any of these tag slugs.
        match_prefix:
          type: string
          format: uuid
          nullable: true
          description: Only IPs inside this prefix.
        severity:
          $ref: '#/components/schemas/SeverityEnum'
    PatchedAutomationTargetRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        kind:
          type: string
          minLength: 1
        enabled:
          type: boolean
        base_url:
          type: string
          format: uri
          minLength: 1
          description: AWX/AAP controller URL (e.g. https://awx.example.com) or, for
            a generic webhook, the full POST URL.
          maxLength: 512
        job_template_id:
          type: string
          description: AWX job-template id to launch (AWX kind only).
          maxLength: 64
        token:
          type: string
          writeOnly: true
        ssl_verify:
          type: boolean
        extra_vars:
          description: Extra vars merged into the AWX launch / webhook payload.
        auto_on_change:
          type: boolean
        object_types:
          description: 'Object-type slugs this target can deploy (default: device).'
