  /api/automation-targets/{id}/deploy/:
    post:
      operationId: automation_targets_deploy_create
      description: |-
        Bulk deploy: dispatch the given devices to this target in one run.

        Body: {"device_ids": ["<uuid>", ...]}. Device ids are validated against
        the caller's row/site view scope for `device` (not just the target's
        tenant) — otherwise a Site-A operator could enqueue a deploy / AWX job
        against Site-B devices they can't see.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this automation target.
        required: true
      tags:
      - automation-targets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationTargetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AutomationTargetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AutomationTargetRequest'
        required: true
