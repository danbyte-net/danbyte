  /api/plugins/apply/:
    post:
      operationId: plugins_apply_create
      description: |-
        Apply plugin changes: run migrations then restart Danbyte (superuser).

        The install model is "package + restart": an operator pip-installs a plugin
        and adds it to PLUGINS; this is the smart in-UI equivalent of the manual
        ``migrate`` + service restart, run detached so a long migration can't time
        out the request.
      summary: 'Apply plugin changes: run migrations then restart Danbyte (superuser)'
      tags:
      - plugins
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: The apply result, including an `ok` flag and any details.
  /api/plugins/ui/:
    get:
      operationId: plugins_ui_retrieve
      description: |-
        Nav items / pages / dashboard panels contributed by the plugins enabled
        for the caller's active tenant.

        Enablement is filtered here; per-object RBAC stays authoritative downstream —
        nav items carry ``object_type``/``perm`` for the frontend's existing
        visibility gate, and each page's data endpoint enforces its own RBAC.
      summary: Server-driven UI metadata for the active tenant's enabled plugins
      tags:
      - plugins
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Nav items, pages, and dashboard panels contributed by the plugins
            enabled for the caller's active tenant.
  /api/plugins/upload/:
    post:
      operationId: plugins_upload_create
      description: |-
        Install a plugin from an uploaded archive (superuser only).

        Offline/airgapped alternative to pip: extract a .tar.gz/.zip of the plugin
        into the import path. Uploading a plugin runs its code on restart — remote
        code execution by design — so this is superuser-gated. Activate with Apply
        (migrate + restart).
      summary: Install a plugin from an uploaded archive (superuser only)
      tags:
      - plugins
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PluginUploadRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PluginUploadRequestRequest'
        required: true
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: The installed plugin name and an apply-to-activate message.
