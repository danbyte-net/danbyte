        Write endpoints reject anonymous calls and refuse to touch rows from
        a different tenant (defence-in-depth — the queryset filter already
        hides them, but a hand-crafted PATCH could try).

        RBAC: action grants are checked by ``RBACObjectPermission`` (via the
        mixin) and row constraints applied in ``get_queryset`` below.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - deploy-runs
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeployRunList'
          description: ''
