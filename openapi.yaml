                $ref: '#/components/schemas/SystemUpgradeCancelResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: users.manage permission required.
        '409':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: An upgrade process is genuinely still running.
