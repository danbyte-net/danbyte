    Device:
      type: object
      description: |-
        Shared status fields for any model with a ``Status`` FK: a nested
        read-only ``status`` ({id,name,color,text_color}) + a write-only
        ``status_id``. Mix in before ``ModelSerializer``; add ``status_id`` to
        ``Meta.fields`` (``status`` is already there).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        numid:
          type: integer
          readOnly: true
          nullable: true
          description: Per-tenant human-readable number (see NumIdSequence).
        name:
          type: string
          maxLength: 255
        device_type:
          allOf:
          - $ref: '#/components/schemas/DeviceTypeMini'
          readOnly: true
        site:
          allOf:
          - $ref: '#/components/schemas/SiteMini'
          readOnly: true
        role:
          type: object
          additionalProperties: {}
          readOnly: true
        platform:
          type: object
          additionalProperties: {}
          readOnly: true
        effective_platform:
          type: object
          additionalProperties: {}
          readOnly: true
        rack:
          type: object
          additionalProperties: {}
          readOnly: true
        position:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          description: Lowest rack unit (U) this device occupies.
        face:
          oneOf:
          - $ref: '#/components/schemas/FaceEnum'
          - $ref: '#/components/schemas/BlankEnum'
        rack_side:
          description: |-
            Which half of the U a half-width device occupies (the device type's rack_width must be 'half'). Blank for full-width devices.

            * `left` - Left
            * `right` - Right
          oneOf:
          - $ref: '#/components/schemas/RackSideEnum'
          - $ref: '#/components/schemas/BlankEnum'
        u_height:
          type: integer
          readOnly: true
        rack_width:
          type: string
          readOnly: true
        location:
          type: object
          additionalProperties: {}
          readOnly: true
        cluster:
          type: object
          additionalProperties: {}
          readOnly: true
        virtual_chassis:
          type: object
          additionalProperties: {}
          readOnly: true
        vc_position:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          description: Member id within the stack (0–255, unique per chassis).
        vc_priority:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          description: Master-election priority within the stack.
        vc_renamed_interfaces:
          type: array
          items: {}
          readOnly: true
        config_template:
          type: object
          additionalProperties: {}
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusMini'
