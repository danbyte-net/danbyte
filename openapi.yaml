          type: string
          description: Model label, e.g. api.prefix.
          maxLength: 64
        object_label:
          type: string
          description: Human model name, e.g. Prefix.
          maxLength: 64
        object_id:
          type: string
          maxLength: 64
        object_repr:
          type: string
          maxLength: 255
        changes:
          type: object
          additionalProperties: {}
          description: |-
            Enrich FK fields with a resolved label so the UI can show the VLAN /
            site / role name next to its UUID. Non-relation fields pass through.
          readOnly: true
        change_count:
          type: integer
          readOnly: true
        request_id:
          type: string
          maxLength: 36
        pre_change:
          nullable: true
        post_change:
          nullable: true
        related_labels:
          type: object
          additionalProperties: {}
          description: |-
            Flat ``{uuid: human label}`` for every resolvable FK value anywhere
            in this entry — the compact diff *and* both full snapshots. A UUID is
            globally unique, so one map lets the UI swap in the site / device /
