    PatchedCableRequest:
      type: object
      description: |-
        Read+write cable with A/B termination sets (1:1, breakout 1:N, M:N).

        Read: ``a_terminations`` / ``b_terminations`` (lists of
        ``{kind,id,name,device}``). Write: ``a`` / ``b`` lists of ``{kind, id}``
        where kind ∈ interface|front_port|rear_port.
      properties:
        label:
          type: string
          description: Free-form physical label (matches NetBox's cable label) — what's
            printed on the cable's tag.
          maxLength: 255
        type:
          type: string
        status_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        length:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
        length_unit:
          oneOf:
          - $ref: '#/components/schemas/LengthUnitEnum'
          - $ref: '#/components/schemas/BlankEnum'
        color:
          type: string
          description: Optional 7-char hex — the physical cable's color.
          maxLength: 7
        description:
          type: string
        fiber_count:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          description: Number of fibre strands in the cable (2, 12, 24, 48…).
        strands: {}
        a:
          type: array
          items:
            type: object
            additionalProperties: {}
          writeOnly: true
        b:
          type: array
          items:
            type: object
            additionalProperties: {}
          writeOnly: true
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        custom_fields:
          description: User-defined custom fields
    PatchedCableRouteRequest:
      type: object
      description: |-
        A geographic duct/aerial/trench run on the site map. Cables are
        assigned manually in v1 — the route lists the cables that follow it.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        kind:
          type: string
          maxLength: 32
        color:
          type: string
          maxLength: 7
        waypoints: {}
        description:
          type: string
        cable_ids:
          type: array
          items:
            type: string
            format: uuid
            writeOnly: true
          writeOnly: true
    PatchedCheckAssignmentRequest:
      type: object
      properties:
        template:
          type: string
          format: uuid
        ip_address:
          type: string
          format: uuid
          nullable: true
        prefix:
          type: string
          format: uuid
          nullable: true
        schedule_mode:
          $ref: '#/components/schemas/ScheduleModeEnum'
        overrides:
          description: 'Per-assignment overrides of the template — recognised keys:
            interval_seconds, timeout_ms, rise, fall, params (shallow-merged).'
        enabled:
          type: boolean
        apply_to_children:
          type: boolean
          description: 'Prefix assignments only: also apply to child IPs in the prefix''s
            containment tree.'
        exclusions:
          type: array
          items:
            type: string
            format: uuid
    PatchedCheckTemplateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        slug:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
        kind:
          $ref: '#/components/schemas/Kind854Enum'
        params:
          description: Kind-specific, non-secret config (port, oid, path, expected_status,
            thresholds…). Validated per-kind.
        secret_params:
          writeOnly: true
        interval_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: How often the check runs, in seconds.
        timeout_ms:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Per-attempt timeout in milliseconds.
        retries:
          type: integer
          maximum: 32767
          minimum: 0
          description: Immediate retries on a failed attempt before recording a failure
            for this run.
        rise:
          type: integer
          maximum: 32767
          minimum: 0
          description: Consecutive successes required to transition to UP.
        fall:
          type: integer
          maximum: 32767
          minimum: 0
          description: Consecutive failures required to transition to DOWN.
        degraded_enabled:
          type: boolean
          description: Evaluate the kind's degraded criteria (latency threshold, value
            mismatch, unexpected HTTP code) when reachable.
        enabled:
          type: boolean
    PatchedCircuitRequest:
      type: object
      description: |-
