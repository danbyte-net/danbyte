  /api/ips/:
    get:
      operationId: ips_list
      description: |-
        Adds ``GET /<type>/<id>/clone/`` → an initial-values payload for the
        create form, seeded from an existing object.

        Only the fields named in ``clone_fields`` are carried over — an **allowlist**,
