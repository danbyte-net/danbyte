    VMInterface:
      type: object
      description: |-
        Persist ``tags`` for serializers backed by django-taggit's
        ``TaggableManager``. Without this, DRF's default ``create()`` /
        ``update()`` silently drops the value because ``tags`` isn't a real
        M2M field on the model — it's a custom manager descriptor.

        Used together with::

            tag_ids = PrimaryKeyRelatedField(source="tags", many=True,
                                             queryset=Tag.objects.all(), ...)

        Semantics:
        - POST / PUT with ``tag_ids`` → tags replaced with that list (empty list clears).
        - PATCH without ``tag_ids`` → tags untouched.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        vm:
          allOf:
          - $ref: '#/components/schemas/VirtualMachineMini'
          readOnly: true
        name:
          type: string
          maxLength: 64
        enabled:
          type: boolean
        mac_address:
          type: string
          maxLength: 17
        mtu:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        description:
          type: string
        ip_addresses:
          type: array
          items: {}
          readOnly: true
        vlan:
          allOf:
          - $ref: '#/components/schemas/VLANMini'
          readOnly: true
        mode:
          description: |-
            802.1Q mode. Access = untagged only; Tagged = a trunk carrying tagged_vlans (+ the untagged native VLAN).

            * `access` - Access
            * `tagged` - Tagged (trunk)
            * `tagged-all` - Tagged (all VLANs)
