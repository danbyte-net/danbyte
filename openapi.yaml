    MonitoringSettings:
      type: object
      properties:
        global_enabled:
          type: boolean
          description: Master switch that 'follow global' assignments obey.
        default_interval_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Interval new checks inherit by default.
        stale_after_scans:
          type: integer
          maximum: 32767
          minimum: 0
          description: Consecutive failed checks before a down IP is marked stale
            (0 = never by scan count).
        stale_after_days:
          type: integer
          maximum: 32767
          minimum: 0
          description: Days continuously down before a down IP is marked stale (0
            = never by time).
        skip_ip_statuses:
          type: array
          items:
            type: string
            format: uuid
        skip_ip_status_detail:
          type: string
          readOnly: true
        dns_sync_enabled:
          type: boolean
          description: Resolve reverse DNS (PTR) for monitored IPs and store it as
            the IP's dns_name.
        dns_clear_on_missing:
          type: boolean
          description: Clear dns_name when the PTR lookup returns nothing.
        dns_preserve_if_alive:
          type: boolean
          description: Keep the existing dns_name on a failed lookup if the IP is
            currently up (transient DNS blip vs. a real removal).
        renotify_enabled:
          type: boolean
          description: Re-send a reminder for alerts still firing and unacknowledged.
        renotify_interval_minutes:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Minutes between renotifications of a firing alert.
        escalate_enabled:
          type: boolean
        escalate_after_minutes:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Minutes a firing, unacked alert waits before escalating to
            critical.
        flap_threshold:
          type: integer
          maximum: 32767
          minimum: 0
          description: Opens within the flap window before an alert is marked flapping
            (0 = disable flap detection).
        flap_window_minutes:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Window for counting flaps.
        group_notifications:
          type: boolean
          description: Coalesce a burst of new alerts into one grouped notification.
        group_threshold:
          type: integer
          maximum: 32767
          minimum: 0
          description: New alerts in one scan batch before they're grouped into a
            digest.
        discovery_enabled:
          type: boolean
          description: Master switch for periodic subnet discovery (per-prefix opt-in).
        discovery_min_prefix_length:
          type: integer
          maximum: 32767
          minimum: 0
          description: Smallest prefix length (largest subnet) discovery will sweep.
            22 = up to /22 (~1k hosts); guards against scanning huge ranges.
        discovery_interval_minutes:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: How often each auto-discover prefix is re-swept, in minutes.
        discovery_all_prefixes:
          type: boolean
          description: Auto-discover every prefix by default (no per-prefix opt-in
            needed). Per-prefix auto_discover still enrols a subnet + its children.
        cleanup_enabled:
          type: boolean
          description: Delete discovered IPs unreachable for longer than the grace
            period.
        cleanup_after_days:
          type: integer
          maximum: 32767
          minimum: 0
          description: Days a discovered IP must be unseen before cleanup removes
            it.
        flap_exclude_ip_statuses:
          type: array
          items:
            type: string
            format: uuid
        flap_exclude_ip_status_detail:
          type: string
          readOnly: true
        default_engine:
          type: string
          format: uuid
          nullable: true
          description: Default monitoring engine for targets with no site/location
            engine assigned (null = the local built-in engine).
        outpost_repo_url:
          type: string
          description: GitHub repo of the Outpost agent, e.g. https://github.com/danbyte-net/danbyte-outpost.
          maxLength: 512
        outpost_repo_token_set:
          type: boolean
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - flap_exclude_ip_status_detail
      - outpost_repo_token_set
      - skip_ip_status_detail
      - updated_at
