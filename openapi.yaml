          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PrefixRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PrefixRequest'
        required: true
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
