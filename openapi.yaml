        which is longer than gunicorn's default request-line limit (4094) — the
        proxy answered 400 before Django ever saw it, and every list page's
        monitoring column silently showed dashes. The SPA POSTs now; GET stays
        for scripts and backward compatibility.
      summary: Roll-up status for many IPs/prefixes/devices (body form)
      tags:
      - monitoring
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkStatusRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkStatusRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkStatusRequestRequest'
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Per-target roll-up status keyed by object id.
