        positions:
          type: integer
          maximum: 32767
          minimum: 0
          description: Fibre strands this connector carries (LC=1, LC-duplex=2, MPO=8–24).
            Claims that many consecutive rear-port positions from the start.
        type:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        cable:
          type: object
          additionalProperties: {}
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
