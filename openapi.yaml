          type: string
          format: uuid
          readOnly: true
        version:
          type: string
          maxLength: 64
        source:
          $ref: '#/components/schemas/SourceEnum'
        has_artifact:
          type: boolean
          readOnly: true
        git_url:
          type: string
          maxLength: 512
        git_ref:
          type: string
          maxLength: 128
        description:
          type: string
        is_default:
          type: boolean
        size_bytes:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - has_artifact
      - id
      - size_bytes
      - version
    OutpostReleaseRequest:
      type: object
      description: |-
        A stored Outpost build. The artifact is write-only (upload); reads expose
        only whether it's present — downloads go through the auth'd endpoint.
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 64
        source:
          $ref: '#/components/schemas/SourceEnum'
        artifact:
          type: string
          format: binary
          writeOnly: true
        git_url:
          type: string
          maxLength: 512
        git_ref:
          type: string
          maxLength: 128
        description:
          type: string
        is_default:
          type: boolean
      required:
      - version
    OutpostResultItemRequest:
      type: object
      properties:
        state_id:
          type: string
          minLength: 1
        status:
          $ref: '#/components/schemas/OutpostResultItemStatusEnum'
        latency_ms:
          type: number
          format: double
        detail: {}
      required:
      - state_id
      - status
    OutpostResultItemStatusEnum:
      enum:
      - degraded
      - down
      - unknown
      - up
      type: string
      description: |-
