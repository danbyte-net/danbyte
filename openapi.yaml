          minimum: -2147483648
          nullable: true
        enabled:
          type: boolean
        mgmt_only:
          type: boolean
          description: Out-of-band management interface.
        duplex:
          oneOf:
          - $ref: '#/components/schemas/DuplexEnum'
          - $ref: '#/components/schemas/BlankEnum'
        poe_mode:
          oneOf:
          - $ref: '#/components/schemas/PoeModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
