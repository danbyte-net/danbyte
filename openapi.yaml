components:
  schemas:
    ASN:
      type: object
      description: |-
        Field-level validation of ``custom_fields`` against the active tenant's
        custom-field definitions. Subclasses set ``cf_model`` to the model slug
        (e.g. ``"prefix"``) and include ``custom_fields`` in ``Meta.fields``.

        The validator only runs when ``custom_fields`` is in the payload, so a
        PATCH that doesn't touch it leaves stored values alone.
      properties:
        numid:
          type: integer
          readOnly: true
          nullable: true
          description: Per-tenant human-readable number (see NumIdSequence).
        id:
          type: string
          format: uuid
          readOnly: true
        asn:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: 1…4294967295 (32-bit).
        rir:
          allOf:
          - $ref: '#/components/schemas/RIRMini'
          readOnly: true
        sites:
          type: array
          items:
            $ref: '#/components/schemas/SiteMini'
          readOnly: true
        description:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        custom_fields:
          description: User-defined custom fields
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - asn
      - created_at
      - id
      - numid
      - rir
      - sites
      - tags
      - updated_at
    ASNRequest:
      type: object
      description: |-
        Field-level validation of ``custom_fields`` against the active tenant's
        custom-field definitions. Subclasses set ``cf_model`` to the model slug
        (e.g. ``"prefix"``) and include ``custom_fields`` in ``Meta.fields``.

        The validator only runs when ``custom_fields`` is in the payload, so a
        PATCH that doesn't touch it leaves stored values alone.
      properties:
        asn:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: 1…4294967295 (32-bit).
        rir_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        site_ids:
          type: array
          items:
            type: string
            format: uuid
            writeOnly: true
          writeOnly: true
        description:
          type: string
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        custom_fields:
          description: User-defined custom fields
      required:
      - asn
    ActionEnum:
      enum:
      - create
      - update
      - delete
      type: string
      description: |-
        * `create` - Created
        * `update` - Updated
        * `delete` - Deleted
    Aggregate:
      type: object
      description: |-
        Field-level validation of ``custom_fields`` against the active tenant's
        custom-field definitions. Subclasses set ``cf_model`` to the model slug
        (e.g. ``"prefix"``) and include ``custom_fields`` in ``Meta.fields``.

        The validator only runs when ``custom_fields`` is in the payload, so a
        PATCH that doesn't touch it leaves stored values alone.
      properties:
        numid:
          type: integer
          readOnly: true
          nullable: true
          description: Per-tenant human-readable number (see NumIdSequence).
        id:
          type: string
          format: uuid
          readOnly: true
        prefix:
          type: string
          description: e.g. 10.0.0.0/8 or 2001:db8::/32
          maxLength: 43
        family:
          type: integer
          readOnly: true
          nullable: true
        utilisation_pct:
          type: integer
          readOnly: true
          nullable: true
        rir:
          allOf:
          - $ref: '#/components/schemas/RIRMini'
          readOnly: true
        date_added:
          type: string
          format: date
          nullable: true
        description:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        custom_fields:
          description: User-defined custom fields
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - family
      - id
      - numid
      - prefix
      - rir
      - tags
      - updated_at
      - utilisation_pct
    AggregateRequest:
      type: object
      description: |-
        Field-level validation of ``custom_fields`` against the active tenant's
        custom-field definitions. Subclasses set ``cf_model`` to the model slug
        (e.g. ``"prefix"``) and include ``custom_fields`` in ``Meta.fields``.

        The validator only runs when ``custom_fields`` is in the payload, so a
        PATCH that doesn't touch it leaves stored values alone.
      properties:
        prefix:
          type: string
          minLength: 1
          description: e.g. 10.0.0.0/8 or 2001:db8::/32
          maxLength: 43
        rir_id:
          type: string
          format: uuid
          writeOnly: true
        date_added:
          type: string
          format: date
          nullable: true
        description:
          type: string
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
        custom_fields:
          description: User-defined custom fields
      required:
      - prefix
      - rir_id
    AirflowEnum:
      enum:
      - front-to-rear
      - rear-to-front
      - left-to-right
      - right-to-left
      - passive
      - mixed
      type: string
      description: |-
        * `front-to-rear` - Front to rear
        * `rear-to-front` - Rear to front
        * `left-to-right` - Left to right
        * `right-to-left` - Right to left
        * `passive` - Passive
        * `mixed` - Mixed
    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        target_ip:
          allOf:
          - $ref: '#/components/schemas/MonitoringIPMini'
          readOnly: true
        template:
          allOf:
          - $ref: '#/components/schemas/TemplateMini'
          readOnly: true
        rule_name:
          type: string
          readOnly: true
        kind:
          $ref: '#/components/schemas/Kind854Enum'
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        status:
          $ref: '#/components/schemas/AlertStatusEnum'
        check_status:
          allOf:
          - $ref: '#/components/schemas/CheckStatusEnum'
          description: |-
            The bad status that opened/sustains this alert.

            * `up` - Up
            * `down` - Down
            * `degraded` - Degraded
            * `unknown` - Unknown
            * `stale` - Stale
            * `skipped` - Skipped
        opened_at:
          type: string
          format: date-time
        last_status_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        detail: {}
        acknowledged:
          type: boolean
          readOnly: true
        acknowledged_at:
          type: string
          format: date-time
          nullable: true
        acknowledged_by_name:
          type: string
          readOnly: true
        ack_note:
          type: string
          maxLength: 255
        silenced:
          type: boolean
          readOnly: true
        flapping:
          type: boolean
          description: Condition is opening/clearing repeatedly — renotify is paused.
        escalated:
          type: boolean
          description: Bumped to critical after firing unacked past the threshold.
        notify_count:
          type: integer
