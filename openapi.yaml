        id:
          type: string
          format: uuid
          readOnly: true
        ip_address:
          type: string
        dns_name:
          type: string
          description: Hostname / DNS name for this address (its PTR record). Auto-filled
            by reverse-DNS monitoring when enabled.
          maxLength: 255
