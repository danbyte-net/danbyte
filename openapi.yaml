    PatchedIPAddressRequest:
      type: object
      description: |-
        Adds a read-only ``permissions`` field — ``{"change": bool, "delete":
        bool}`` for the *current user on this specific object*, in the active tenant.

        Unlike the frontend's type-level ``canDo`` map, this is **constraint-aware**:
        a grant restricted to certain rows (e.g. only ``status=active`` prefixes)
        reports ``change: false`` for an object outside that set, so the UI can hide
        an Edit button that would only 403. The API still enforces independently;
        this is presentation, not the boundary.

        The per-action constraint decision is resolved once per request and cached,
        so serializing a list stays cheap: superuser / ungranted / unconstrained
        rows never hit the DB; only a genuinely constrained grant runs one indexed
        ``pk`` lookup per row.

        Set ``rbac_object_type`` on the serializer to override the slug; it defaults
        to the model's ``model_name``.
      properties:
        ip_address:
          type: string
          minLength: 1
        prefix_id:
          type: string
          format: uuid
          writeOnly: true
        status_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        role_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        assigned_device_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        assigned_interface_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        switch_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        switch_interface_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        assigned_vm_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        assigned_vm_interface_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        mac_address:
          type: string
          description: Hardware address paired with this IP — e.g. a DHCP reservation.
            Independent of the interface's own MAC.
          maxLength: 17
        dns_name:
          type: string
          description: Hostname / DNS name for this address (its PTR record). Auto-filled
            by reverse-DNS monitoring when enabled.
          maxLength: 255
        flap_exclude:
          type: boolean
          description: Exclude this IP from the flapping monitor — for a known noisy
            host you don't want flagged.
        description:
          type: string
        reservation_note:
          type: string
          description: Short free-text note shown on hover. Statuses with ``requires_note=True``
            (e.g. Reserved) demand this.
          maxLength: 200
        custom_fields:
          description: User-defined custom fields
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
    PatchedIPRangeRequest:
