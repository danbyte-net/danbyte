openapi: 3.0.3
info:
  title: Danbyte API
  version: 0.9.13
  description: 'REST API for Danbyte — IPAM / DCIM and network operations. Authenticate
    with a scoped **API token** (`Authorization: Token <key>`) or, from a browser
    session, the logged-in session cookie. Every request is scoped to your active
    tenant and enforced by RBAC.'
paths:
  /api/aggregates/:
    get:
      operationId: aggregates_list
      description: |-
        Read+write base.

        Same tenant filter on the queryset as the read-only base, plus a
        ``perform_create`` that stamps the active tenant onto the new row.
        Write endpoints reject anonymous calls and refuse to touch rows from
        a different tenant (defence-in-depth — the queryset filter already
        hides them, but a hand-crafted PATCH could try).

        RBAC: action grants are checked by ``RBACObjectPermission`` (via the
        mixin) and row constraints applied in ``get_queryset`` below.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - aggregates
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAggregateList'
          description: ''
    post:
      operationId: aggregates_create
      description: |-
        Read+write base.

        Same tenant filter on the queryset as the read-only base, plus a
        ``perform_create`` that stamps the active tenant onto the new row.
        Write endpoints reject anonymous calls and refuse to touch rows from
        a different tenant (defence-in-depth — the queryset filter already
        hides them, but a hand-crafted PATCH could try).

        RBAC: action grants are checked by ``RBACObjectPermission`` (via the
        mixin) and row constraints applied in ``get_queryset`` below.
      tags:
      - aggregates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AggregateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AggregateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AggregateRequest'
        required: true
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aggregate'
          description: ''
