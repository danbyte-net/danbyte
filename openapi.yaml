          maxLength: 512
        map_satellite_url:
          description: Satellite tile URL template ({z}/{x}/{y} or {z}/{y}/{x}). Blank
            = Esri World Imagery.
          oneOf:
          - type: string
            format: uri
            maxLength: 200
          - type: string
            maxLength: 0
        map_satellite_attribution:
          type: string
          maxLength: 512
        enhanced_site_separation:
          type: boolean
          description: 'When on, each site behaves like a mini-tenant for site-scoped
            users: pickers only offer their sites, new objects default there, and
            catalog entries they create are local to their site. Cross-site users
            and admins are unaffected.'
        allow_site_settings:
          type: boolean
          description: When on, site admins (site editors, or holders of a sitesettings
            grant) may manage their own site's settings — e.g. email delivery.
        allow_site_editor_delegation:
          type: boolean
          description: When on, a site editor (local IT) may invite their own viewers
            to the site(s) they edit — without a global admin.
        config_drift_enabled:
          type: boolean
          description: When on, Danbyte periodically dispatches a config-drift run
            to every enabled automation target.
        config_drift_interval_minutes:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Minimum minutes between scheduled config-drift dispatches.
        config_drift_last_run:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Timestamp of the last scheduled config-drift dispatch.
        digest_enabled:
          type: boolean
          description: Email a periodic monitoring/status digest to the recipients
            below.
        digest_frequency:
          $ref: '#/components/schemas/DigestFrequencyEnum'
        digest_weekday:
          type: integer
          maximum: 32767
          minimum: 0
          description: Day to send the weekly digest (0=Monday … 6=Sunday).
        digest_recipients:
          type: string
          description: Digest recipients — comma/newline-separated email addresses.
        human_ids_enabled:
          type: boolean
          description: 'When on, objects expose a short per-tenant sequential number
            (numid) alongside their UUID — e.g. so a cable physically tagged ''27''
            maps to cable #27. Numbers are namespaced per tenant, so each tenant counts
            from 1 independently.'
        date_format:
          allOf:
          - $ref: '#/components/schemas/DateFormatEnum'
          description: |-
            How the UI renders calendar dates by default.

            * `YYYY-MM-DD` - 2026-01-31 (ISO)
            * `DD.MM.YYYY` - 31.01.2026
            * `DD/MM/YYYY` - 31/01/2026
            * `MM/DD/YYYY` - 01/31/2026
            * `DD MMM YYYY` - 31 Jan 2026
        time_style:
          allOf:
          - $ref: '#/components/schemas/TimeStyleEnum'
          description: |-
            24-hour or 12-hour AM/PM clock for rendered times.

            * `24h` - 24-hour (14:30)
            * `12h` - 12-hour (2:30 PM)
        display_timezone:
          type: string
          description: IANA timezone (e.g. Europe/Copenhagen) the UI renders times
            in. Blank = the server's TIME_ZONE.
          maxLength: 64
        release_repo_url:
          type: string
          maxLength: 512
        release_repo_token_set:
          type: boolean
          readOnly: true
        disable_update_check:
          type: boolean
        auto_update_enabled:
          type: boolean
        update_channel:
          $ref: '#/components/schemas/UpdateChannelEnum'
        update_window_days:
          type: string
          maxLength: 32
        update_window_start:
          type: string
          maxLength: 5
        update_window_end:
          type: string
          maxLength: 5
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - config_drift_last_run
      - favicon_url
      - release_repo_token_set
      - smtp_password_set
      - updated_at
