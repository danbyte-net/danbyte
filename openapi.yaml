          - $ref: '#/components/schemas/VRFMini'
          readOnly: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        cable:
          type: object
          additionalProperties: {}
          readOnly: true
        cable_count:
          type: integer
          readOnly: true
        ip_addresses:
          type: array
          items: {}
          readOnly: true
        tunnel_terminations:
          type: array
          items: {}
          readOnly: true
        virtual:
          type: boolean
          description: A logical interface with no physical port — sub-interface,
            LAG/aggregate, loopback, tunnel, VLAN interface.
        parent:
          type: object
          additionalProperties: {}
          readOnly: true
        child_count:
          type: integer
