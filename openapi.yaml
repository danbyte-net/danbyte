    Interface:
      type: object
      description: |-
        Persist ``tags`` for serializers backed by django-taggit's
        ``TaggableManager``. Without this, DRF's default ``create()`` /
        ``update()`` silently drops the value because ``tags`` isn't a real
        M2M field on the model — it's a custom manager descriptor.

        Used together with::

            tag_ids = PrimaryKeyRelatedField(source="tags", many=True,
                                             queryset=Tag.objects.all(), ...)

        Semantics:
        - POST / PUT with ``tag_ids`` → tags replaced with that list (empty list clears).
        - PATCH without ``tag_ids`` → tags untouched.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        device:
          allOf:
          - $ref: '#/components/schemas/DeviceMini'
          readOnly: true
        name:
          type: string
          maxLength: 64
        type:
          type: string
        type_display:
          type: string
          readOnly: true
        speed:
          type: string
          maxLength: 64
        mtu:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        enabled:
          type: boolean
        mgmt_only:
          type: boolean
          description: Out-of-band management interface.
        duplex:
          oneOf:
          - $ref: '#/components/schemas/DuplexEnum'
          - $ref: '#/components/schemas/BlankEnum'
        poe_mode:
          oneOf:
          - $ref: '#/components/schemas/PoeModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        poe_type:
          type: string
          description: IEEE standard / passive type, e.g. type2-ieee802.3at.
          maxLength: 32
        wwn:
          type: string
          description: World Wide Name (Fibre Channel), colon-separated hex.
          maxLength: 32
        mac_address:
          type: string
          description: Layer-2 hardware address, e.g. 00:1b:44:11:3a:b7.
          maxLength: 17
        mac_addresses:
          type: array
          items: {}
          readOnly: true
        mode:
          description: |-
            802.1Q mode. Access = untagged only; Tagged = a trunk carrying tagged_vlans (+ the untagged native VLAN).

            * `access` - Access
            * `tagged` - Tagged (trunk)
            * `tagged-all` - Tagged (all VLANs)
          oneOf:
          - $ref: '#/components/schemas/ModeB10Enum'
          - $ref: '#/components/schemas/BlankEnum'
        mode_display:
          type: string
          readOnly: true
        vlan:
