      summary: List installed plugins and their load/apply state
      tags:
      - plugins
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: 'Installed-plugin inventory: each plugin''s load state and
            unapplied migrations, plus deployment-wide has_pending_migrations, pending_restart,
            and needs_apply signals.'
  /api/plugins/{slug}/config/:
    get:
      operationId: plugins_config_retrieve
      description: |-
        Read or set a plugin's enablement.

        GET returns the effective state for the caller's active tenant plus the raw
        tenant/deployment rows. PATCH ``{enabled, scope}`` upserts a row: scope
        ``"tenant"`` (default) needs tenant-admin (``can_manage_admin``); scope
        ``"deployment"`` needs deployment-admin (``can_manage_deployment``).
      summary: Read a plugin's effective enablement for the active tenant
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - plugins
      security:
      - apiToken: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: The plugin's effective enabled state plus the raw tenant/deployment
            rows and the plugin's default_enabled.
    patch:
      operationId: plugins_config_partial_update
      description: |-
        Read or set a plugin's enablement.

        GET returns the effective state for the caller's active tenant plus the raw
        tenant/deployment rows. PATCH ``{enabled, scope}`` upserts a row: scope
        ``"tenant"`` (default) needs tenant-admin (``can_manage_admin``); scope
        ``"deployment"`` needs deployment-admin (``can_manage_deployment``).
      summary: Enable or disable a plugin at tenant or deployment scope
