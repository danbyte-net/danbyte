            format: uuid
            writeOnly: true
          writeOnly: true
        vrf_id:
          type: string
          format: uuid
          writeOnly: true
          nullable: true
        tag_ids:
          type: array
          items:
            type: integer
            writeOnly: true
          writeOnly: true
