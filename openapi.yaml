          type: string
          description: Long-form notes (separate from the short description).
        airflow:
          description: |-
            Direction of cooling airflow through the chassis.

            * `front-to-rear` - Front to rear
            * `rear-to-front` - Rear to front
            * `left-to-right` - Left to right
            * `right-to-left` - Right to left
            * `passive` - Passive
