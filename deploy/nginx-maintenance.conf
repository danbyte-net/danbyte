# Danbyte maintenance page — serve a friendly "updating" page instead of a raw
# 502 while the backend restarts (during an in-app upgrade, or any brief outage).
#
# `include` this inside your Danbyte `server { … }` block. The 502/503/504 from
# a down backend is caught and the static page is served. Point `root` at the
# directory that holds maintenance.html (this deploy/ folder).
#
# deploy/setup-maintenance.sh wires this in for you (with a backup + nginx -t).
# ---- snippet ----
error_page 502 503 504 @danbyte_maintenance;

location @danbyte_maintenance {
    root /REPLACE/WITH/DANBYTE/deploy;
    rewrite ^ /maintenance.html break;
    internal;
    add_header Retry-After 30 always;
}
